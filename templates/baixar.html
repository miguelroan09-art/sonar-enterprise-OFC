<!DOCTYPE html>
<html>
<head>
<title>Dar Baixa</title>
</head>

<body>

<h2>Dar Baixa em Item</h2>

<form method="POST">

<select name="id_item">

{% for item in itens %}

<option value="{{item[0]}}">
{{item[2]}} - estoque: {{item[3]}}
</option>

{% endfor %}

</select>

<br><br>

<input name="quantidade" placeholder="Quantidade">

<br><br>

<button type="submit">Dar baixa</button>

</form>

</body>
</html>
