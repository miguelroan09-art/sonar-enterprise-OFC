<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Estoque Certo</title>

<style>

body{
    font-family: Arial;
    background:#f1f5f9;
}

header{
    background:#1e293b;
    color:white;
    padding:15px;
}

.container{
    padding:30px;
}

button{
    padding:10px 15px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#1e293b;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f8fafc;
}

</style>

</head>

<body>

<header>
<h2>Estoque Certo - Sonar Enterprise</h2>
</header>

<div class="container">

<a href="/cadastrar">
<button>Cadastrar Item</button>
</a>

<a href="/baixar">
<button>Dar Baixa</button>
</a>

<h3>Itens no Estoque</h3>

<table>

<tr>
<th>ID</th>
<th>Código</th>
<th>Nome</th>
<th>Quantidade</th>
<th>Rua</th>
<th>Prateleira</th>
<th>Nível</th>
</tr>

{% for item in itens %}
<tr>

<td>{{item[0]}}</td>
<td>{{item[1]}}</td>
<td>{{item[2]}}</td>
<td>{{item[3]}}</td>
<td>{{item[4]}}</td>
<td>{{item[5]}}</td>
<td>{{item[6]}}</td>

</tr>
{% endfor %}

</table>

</div>

</body>
</html>
