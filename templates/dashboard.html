<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;

    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    min-height:100vh;
}

header{
    color:white;
    padding:20px;
}

.container{

    background:white;
    margin:30px;
    padding:30px;
    border-radius:10px;

}

.search{
    margin-bottom:20px;
}

.search input{
    padding:10px;
    width:250px;
}

button{
    padding:10px 15px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

table{

    width:100%;
    border-collapse:collapse;
    background:white;

}

th{
    background:#1e293b;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f1f5f9;
}

.actions{
    margin-bottom:20px;
}

</style>

</head>

<body>

<header>

<h2>Estoque Certo</h2>
<p>Sonar Enterprise</p>

</header>

<div class="container">

<div class="search">

<form method="GET">

<input type="text" name="busca" placeholder="Pesquisar item">

<button type="submit">Buscar</button>

</form>

</div>

<div class="actions">

<a href="/cadastrar">
<button>Cadastrar Item</button>
</a>

<a href="/baixar">
<button>Dar Baixa</button>
</a>

</div>

<table>

<tr>
<th>ID</th>
<th>Código</th>
<th>Produto</th>
<th>Quantidade</th>
<th>Rua</th>
<th>Prateleira</th>
<th>Nível</th>
</tr>

{% for item in itens %}

<tr>

<td>{{item[0]}}</td>
<td>{{item[1]}}</td>
<td>{{item[2]}}</td>
<td>{{item[3]}}</td>
<td>{{item[4]}}</td>
<td>{{item[5]}}</td>
<td>{{item[6]}}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
