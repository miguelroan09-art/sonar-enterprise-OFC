<!DOCTYPE html>
<html>
<head>

<title>Login - Estoque Certo</title>

<style>

body{
    margin:0;
    font-family:Arial;

    /* DEGRADÊ AZUL */
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{

    background:white;
    padding:40px;
    width:300px;
    border-radius:10px;
    text-align:center;

}

h2{
    margin-bottom:5px;
}

p{
    color:gray;
    margin-bottom:20px;
}

input{

    width:100%;
    padding:10px;
    margin-bottom:15px;

}

button{

    width:100%;
    padding:10px;

    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<div class="box">

<h2>Estoque Certo</h2>
<p>Sonar Enterprise</p>

<form action="/logar" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="senha" placeholder="Senha" required>

<button type="submit">Entrar</button>

</form>

</div>

</body>
</html>
