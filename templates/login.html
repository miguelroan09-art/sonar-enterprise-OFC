<!DOCTYPE html>
<html>
<head>
<title>Login - Estoque Certo</title>

<style>

body{
    font-family: Arial;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:40px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

h2{
    color:#1e293b;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    margin-top:20px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<div class="box">

<h2>Estoque Certo</h2>
<p>Sonar Enterprise</p>

<form action="/logar" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="senha" placeholder="Senha" required>

<button type="submit">Entrar</button>

</form>

</div>

</body>
</html>
